name: CI/CD Pipeline with ServiceNow DevOps Change Control

on:
  push:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: echo "Executing test suites..."

  create_change_request:
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - name: ServiceNow DevOps Change Request
        uses: ServiceNow/servicenow-devops-change@v4.1.0
        # Step marked as non-blocking — failure won't stop deploy_to_production
        continue-on-error: true
        with:
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: 'deploy_to_production'
          # Stop polling after 10 minutes (600s), checking every 30s
          timeout: '600'
          interval: '30'
          # Don't abort pipeline if change creation itself hits an error
          abortOnChangeCreationFailure: false
          # Don't abort pipeline if polling times out waiting for approval
          abortOnChangeStepTimeout: false
          change-request: >
            {
              "type": "Normal",
              "short_description": "Automated deployment from GitHub Actions",
              "description": "Deploying main branch updates.",
              "priority": "3",
              "implementation_plan": "Automated deployment via GitHub Actions pipeline.",
              "backout_plan": "Re-deploy previous release artifact.",
              "test_plan": "Post-deployment smoke tests executed by pipeline."
            }

  deploy_to_production:
    needs: create_change_request
    runs-on: ubuntu-latest
    # Run deploy even if the change request job failed or timed out
    if: always()
    steps:
      - name: Execute Deployment
        run: echo "Deploying artifacts to production..."
