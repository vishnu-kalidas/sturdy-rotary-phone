name: CI/CD Pipeline with ServiceNow DevOps Change Control

on:
  push:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # (Optional) Run tests and SonarQube quality checks here

  register_change_details:
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Register ServiceNow DevOps Change Attributes
        uses: ServiceNow/servicenow-devops-change@v4.1.0
        with:
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          job-name: 'Deploy to Production' # Must match the exact job name below
          context-github: ${{ toJSON(github) }}
          change-request: >
            {
              "attributes": {
                "short_description": "Automated deployment from GitHub Actions",
                "description": "Deploying main branch updates.",
                "justification": "Required for application updates.",
                "chg_model": "DevOps"
              }
            }

  deploy_to_production:
    needs: register_change_details
    runs-on: ubuntu-latest
    # environment: 'prod' # Triggers the Deployment Protection Rule / Gate
    steps:
      - name: Execute Deployment
        run: |
          echo "Change Request approved! Deploying artifacts..."

