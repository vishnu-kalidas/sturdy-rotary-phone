name: CI/CD Deployment with ServiceNow Governance

on:
  push:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: echo "Executing test suites..."

      # Upload build artifact so deploy job can access it
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .

  create_change_request:
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - name: ServiceNow DevOps Change Request
        uses: ServiceNow/servicenow-devops-change@v4.0.0
        with:
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          context-github: ${{ toJson(github) }}
          # Must exactly match this job's key in the `jobs` map
          job-name: 'create_change_request'
          change-request-details: >
            {
              "short_description": "Automated pipeline deployment",
              "description": "Deploying main branch updates to production.",
              "priority": "3",
              "assignment_group": "Change Management",
              "implementation_plan": "Automated deployment via GitHub Actions pipeline.",
              "backout_plan": "Re-deploy previous release artifact.",
              "test_plan": "Post-deployment smoke tests executed by pipeline."
            }

  # --- NEW JOB: polls ServiceNow until the change is approved or rejected ---
  await_change_approval:
    runs-on: ubuntu-latest
    needs: create_change_request
    steps:
      - name: Wait for ServiceNow Change Approval
        uses: ServiceNow/servicenow-devops-get-change@v4.0.0
        with:
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          context-github: ${{ toJson(github) }}
          # Must match the job name used when the change was created
          job-name: 'create_change_request'

  deploy_to_production:
    runs-on: ubuntu-latest
    # Now depends on approval gate, not directly on change creation
    needs: await_change_approval
    environment: prod
    steps:
      # Restore the build artifact from build_and_test
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Execute Deployment
        run: echo "Deploying artifacts to production environment..."
